name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Build & test
        run: npm run build && npm test

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        run: node scripts/extract-changelog-section.mjs "${{ github.ref_name }}" > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: false

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp-registry:
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Sync server.json version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          export VERSION
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('server.json', 'utf8'));
            j.version = process.env.VERSION;
            if (Array.isArray(j.packages)) {
              for (const pkg of j.packages) pkg.version = process.env.VERSION;
            }
            fs.writeFileSync('server.json', JSON.stringify(j, null, 2) + '\n');
          "
          echo "Publishing MCP Registry metadata for version ${VERSION}"

      - name: Install MCP Publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Dry-run validate server.json
        run: ./mcp-publisher publish --dry-run

      - name: Login to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
