# Manual republish to official MCP Registry (e.g. metadata fix without new tag).
# Tag releases auto-publish via release.yml after npm publish.

name: Publish MCP Registry

on:
  workflow_dispatch:
    inputs:
      version:
        description: "server.json / npm version to publish (e.g. 3.6.3)"
        required: true
        default: "3.6.3"

permissions:
  contents: read
  id-token: write

jobs:
  publish-mcp-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync server.json version from tag or input
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          export VERSION
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('server.json', 'utf8'));
            j.version = process.env.VERSION;
            if (Array.isArray(j.packages)) {
              for (const pkg of j.packages) pkg.version = process.env.VERSION;
            }
            fs.writeFileSync('server.json', JSON.stringify(j, null, 2) + '\n');
          "
          echo "Publishing MCP Registry metadata for version ${VERSION}"

      - name: Install MCP Publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Login to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
